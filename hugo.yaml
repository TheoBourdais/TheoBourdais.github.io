  # About section - DISABLED to avoid redundancy
  about:
    enable: false
    title: "About Me"
    image: "/images/profile.png"
    content: |-
      I am a PhD student in Applied and Computational Mathematics at the California Institute of Technology (Caltech), working under the supervision of Prof. Houman Owhadi. My research interests lie at the intersection of machine learning, Gaussian processes, and computational mathematics.

      My work focuses on developing new theoretical frameworks and practical algorithms for understanding complex systems and data. I am particularly interested in:
      - Computational Hypergraph Discovery
      - Model Aggregation techniques
      - Gaussian Process methods
      - Random Matrix Theory applications in machine learning

    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "Machine Learning"
        - "Gaussian Processes"
        - "Scientific Computing"
        - "Deep Learning"
        - "Random Matrix Theory"

