    title: "Theo Bourdais"
    subtitle: "PhD Student in Computing and Mathematical Sciences"
    content: |-
      I am a PhD student at Caltech working with [Houman Owhadi](http://users.cms.caltech.edu/~owhadi/index.htm). I am also grateful to be supported by the [Kortschak Scholar program](https://www.cms.caltech.edu/research/kortschak-scholars).

      I focus on Machine Learning for Scientific Discovery. In my research, I use
      - Gaussian Processes
      - Computer Vision, Natural Language Processing, and Reinforcement Learning
      - Applied Mathematics, such as Random Matrix Theory and Partial Differential Equations
