{{/*
  Site head extensions: fonts + global custom CSS + light motion helper.
*/}}
<link rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap">
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap"
      media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap">
</noscript>

<link rel="stylesheet" href="{{ .Site.Params.staticPath }}/css/custom.css" media="all">

<script>
document.addEventListener("DOMContentLoaded", function () {
  /* Open files in the browser reader — never force download */
  document.querySelectorAll("a[download]").forEach(function (a) {
    a.removeAttribute("download");
  });
  document.querySelectorAll('a[href$=".pdf"], a[href$=".PDF"], a[href*="/files/"]').forEach(function (a) {
    a.setAttribute("target", "_blank");
    a.setAttribute("rel", "noopener noreferrer");
  });

  var sections = document.querySelectorAll(
    "#news, #experience, #education, #projects, #achievements, #contact, #publications-list, #talks-list, #posts-list"
  );
  sections.forEach(function (el) {
    el.classList.add("tb-reveal");
  });

  if (!("IntersectionObserver" in window)) {
    sections.forEach(function (el) {
      el.classList.add("is-visible");
    });
    return;
  }

  var observer = new IntersectionObserver(
    function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0 }
  );

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      sections.forEach(function (el) {
        observer.observe(el);
      });
    });
  });
});
</script>
